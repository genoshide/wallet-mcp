name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run tests before release
        run: uv run python -X utf8 test_local.py

      - name: Build package
        run: uv build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## wallet-mcp ${{ github.ref_name }}

            ### Install
            ```bash
            uv tool install git+https://github.com/${{ github.repository }}.git@${{ github.ref_name }}
            ```

            ### Claude Desktop config
            ```json
            {
              "mcpServers": {
                "wallet-mcp": {
                  "command": "uv",
                  "args": ["tool", "run", "--from",
                    "git+https://github.com/${{ github.repository }}.git@${{ github.ref_name }}",
                    "wallet-mcp"]
                }
              }
            }
            ```
